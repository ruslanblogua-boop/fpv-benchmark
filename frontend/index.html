<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fpv-heatmap — FPV Systems Benchmarking</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/map.css">
</head>
<body>
  <nav class="topbar">
    <div class="topbar-brand">
      <a href="/" class="topbar-logo">fpv-heatmap</a>
    </div>

    <div class="topbar-categories">
      <a href="/" class="topbar-link active" data-category="link">Link Quality</a>
      <a href="/camera.html" class="topbar-link">Camera</a>
      <a href="/battery.html" class="topbar-link">Battery</a>
    </div>

    <div class="topbar-search">
      <input id="topbar-test-search" type="search" placeholder="Search tests, systems, camera combos...">
      <div id="topbar-search-results" class="topbar-search-results hidden"></div>
    </div>

    <div class="topbar-actions">
      <a href="/upload.html" class="topbar-link topbar-upload">+ New Test</a>
      <button id="topbar-login" class="topbar-link">Login</button>
      <a id="topbar-settings" href="/settings.html" class="topbar-link topbar-icon" title="Settings">⚙</a>
    </div>
  </nav>

  <div id="app" class="viewer-container">
    <div id="map" class="map-container"></div>

    <aside class="sidebar">
      <div class="panel selected-tests-panel">
        <h2>Selected Tests</h2>
        <div id="selected-tests" class="selected-tests"></div>
        <button id="add-test-toggle" class="btn">Add Test</button>
      </div>

      <div class="panel test-browser collapsed">
        <h2>Tests</h2>

        <div class="filters">
          <label>
            Track
            <select id="filter-track">
              <option value="">All Tracks</option>
            </select>
          </label>

          <label>
            Test Type
            <select id="filter-category">
              <option value="">All Test Types</option>
              <option value="video">Video</option>
              <option value="control">Control</option>
            </select>
          </label>

          <label>
            System
            <input type="text" id="filter-system" placeholder="Filter by system...">
          </label>
        </div>

        <div id="test-list" class="test-list">
          <!-- populated by viewer.js -->
        </div>
      </div>

      <div class="panel metric-picker">
        <h3>Metric</h3>
        <div id="metric-options" class="metric-options"></div>
        <div class="metric-scale">
          <label>
            Scale Shift
            <input type="range" id="metric-scale-shift" min="-40" max="40" value="0">
          </label>
          <div id="metric-legend" class="metric-legend"></div>
        </div>
      </div>

      <div class="panel controls">
        <button id="frame-test" class="btn">Frame Test</button>
        <a href="/upload.html" class="btn btn-primary">Upload Test</a>
        <a href="/settings.html" class="btn">Settings</a>
      </div>
    </aside>

    <div class="test-detail-panel">
      <div id="test-info" class="panel">
        <!-- Test details populated here -->
      </div>
      <div id="compare-info"></div>

      <div id="playback" class="playback-controls">
        <div class="slider-container">
          <input type="range" id="playback-slider" min="0" max="100" value="0">
          <span id="playback-time">00:00</span>
        </div>
        <button id="playback-play">Play</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
  <!-- Supabase client library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Make createClient available globally
    if (window.supabase && window.supabase.createClient) {
      window.createClient = window.supabase.createClient;
    }
  </script>
  <script src="js/api.js?v=20260504-5"></script>
  <script src="js/auth.js?v=20260504-5"></script>
  <script src="js/viewer.js?v=20260504-5"></script>
</body>
</html>
