project:
  name: fpv-heatmap
  description: >
    FPV systems benchmarking platform. Community-comparable GPS-correlated
    heatmaps of link quality, and eventually propeller and battery performance.
    Think Wigle.net for FPV gear. Tests are performed on standardized tracks
    so results across pilots and systems are directly comparable.
  domain: "purchased, plug in for free on Cloudflare Pages"
  status: in-progress
  current_phase: scaffold — DB schema done, Worker skeleton started, frontend not started

# ══════════════════════════════════════════════════════════════════════════════
# DECISIONS LOCKED — do not revisit unless noted
# ══════════════════════════════════════════════════════════════════════════════
decisions:

  infrastructure:
    hosting: Cloudflare Pages (frontend static)
    api: Cloudflare Workers (serverless, no cold start)
    database: Cloudflare D1 (SQLite, free tier)
    file_storage: Cloudflare R2 (GeoJSON files, free egress)
    auth: Supabase Auth (Google OAuth, email) — used for login only, JWT verified in Worker
    custom_domain: yes, free on Cloudflare Pages

  data_storage:
    in_d1:
      - user records (mirrored from Supabase)
      - drone profiles
      - track metadata and geometry
      - test metadata and summary stats
      - test lap summaries
      - link loss events (lat/lon/type/duration per event)
    in_r2:
      - "tests/{id}/heatmap.geojson — aggregated spatial cells, rendered by viewer"
      - "tests/{id}/path.geojson — time-ordered path with per-point telemetry, drives playback slider"
      - "tests/{id}/original.csv — raw parser output, archived for reprocessing (optional)"
    not_stored:
      - raw OSD files (processed locally, never uploaded)
      - individual OSD frames (downsampled before upload)
      - video files

  heatmap_storage_approach: >
    Option A — D1 for metadata only, R2 GeoJSON for all heatmap cell data.
    No per-cell rows in D1 for V1. Enables future spatial queries if needed
    by migrating cells to D1 later.

  track_system:
    types:
      - standard: locked geometry, curated, named — primary comparison surface
      - non-standard: open, tagged by location, can be promoted
    proximity_grouping: >
      Non-standard tracks within 100m of each other are auto-grouped in the viewer.
      Once promoted to standard, boundary polygon takes over as grouping key.
    promotion: manual admin action, triggered when enough tests accumulate on same location
    first_standard_track:
      name: Enduro Racetrack
      slug: enduro-01
      status: standard (seeded in DB, geometry TBD — will be set after first real upload)
      type: circuit

  test_modes:
    - circuit: lap-based, pilot draws lap gate on map during upload
    - range: linear, pilot confirms start/end endpoints

  laps:
    multi_lap: supported
    display: averaged heatmap only (no per-lap flip view in V1)

  grid_sizes:
    options: [0.5, 1.0]
    unit: meters
    user_picks: at upload time
    rationale: >
      0.5m captures sharp RF nulls near obstacles. 1m is faster to render.
      2m was considered and rejected — loses important spatial detail for link tests.

  bearing:
    method: GPS course-over-ground (vector between consecutive points)
    smoothing: 3–5 point rolling average
    threshold: freeze bearing below 3 km/h ground speed
    initial: defaults to pilot_bearing_deg at launch before first movement

  link_loss_detection:
    rc_loss: rc_snr_db == 0
    video_loss: bitrate_mbps == 0 OR video_signal_level == 0
    visual: red dot marker on map at loss coordinates
    stored: yes, in link_loss_events table with type (rc/video/both) and duration_ms

  pilot_marker:
    type: single point + bearing arrow
    fields: pilot_lat, pilot_lon, pilot_bearing_deg (0–360)
    set_at: upload step, on map

  drone_profiles:
    reusable: yes, per user
    fields: [name, frame, motors, fc, vtx, props, weight_g, notes]
    fresh_per_test: yes, with "offer to save" prompt
    one_off_handling: offer to save to profile, stays attached to test if declined

  test_naming:
    auto_generated: "{system_under_test} on {track_name} — {YYYY-MM-DD}"
    editable: yes, pilot can override with custom_name
    display: custom_name if set, else auto_name

  weather:
    optional: true
    fields:
      wind_speed: "calm | light | moderate | strong"
      wind_direction: "N | NE | E | SE | S | SW | W | NW"
      weather_notes: free text

  playback_slider:
    data_source: path.geojson (time-ordered, NOT the heatmap cells)
    shows: drone position + bearing arrow animated along path
    per_point_data: [timestamp_ms, lat, lon, bearing_deg, rc_snr_db, bitrate_mbps, altitude_m, speed_ms]

  auth:
    upload_requires_login: true
    read_public: true
    roles: [pilot, admin]
    who_uploads_v1: single pilot (owner), open registration later

  categories_v1: [link]
  categories_planned: [battery, prop, other]


# ══════════════════════════════════════════════════════════════════════════════
# DATA PIPELINE (runs locally on pilot machine)
# ══════════════════════════════════════════════════════════════════════════════
pipeline:

  step_1_parser:
    status: COMPLETE
    input: WalkSnail Avatar .osd file
    output: CSV with one row per OSD frame
    file: walksnail_osd_parser.py
    location: "output as walksnail_osd_parser.py (deliver to user)"

    osd_format:
      magic: "BTFL (bytes 0-3)"
      header_size: 40 bytes
      frame_size: 2124 bytes
      frame_layout: "4 bytes uint32-LE timestamp (ms) + 2120 bytes OSD grid"
      grid: "53 cols × 20 rows, each cell = uint16-LE char index"
      total_frames_formula: "(filesize - 40) / 2124"

    osd_field_map:
      row_1: "glyphs [769][813][gX][gY] = video signal bars (gX/gY range 816–825) | float[154] = bitrate Mbps"
      row_2: "{C:PPP = battery cells:% | p SNR[158] = RC link SNR dB"
      row_4: "[4] ALT = altitude meters"
      row_12: "DIST[7] = distance from home meters"
      row_13: "[147]SPD[6] = ground speed m/s"
      row_17: "[156]MM:SS = flight timer"
      row_19: "[152]LON [137]LAT = GPS decimal degrees (lon first, then lat)"

    csv_schema:
      columns:
        - frame_index
        - timestamp_ms
        - timestamp_s
        - latitude
        - longitude
        - gps_locked
        - rc_snr_db        # RC link SNR in dB, range observed 0–61
        - video_signal_level  # 0–9 bars derived from glyph pair
        - bitrate_mbps
        - altitude_m
        - distance_m
        - speed_ms
        - battery_cells
        - battery_pct
        - timer_s

    cli_usage: "python3 walksnail_osd_parser.py <file.osd> [output.csv] [--all-frames]"
    default_behaviour: outputs GPS-locked frames only

    test_file_results:
      file: AvatarS0025.osd
      total_frames: 1973
      duration_s: 289.5
      gps_locked_frames: 1664
      location: "Warsaw area ~52.18N 21.13E"
      rc_snr_range: "1–61 dB, avg 32"
      bitrate_range: "4.7–32 Mbps, avg 8.7"

  step_2_processor:
    status: NOT STARTED
    input: CSV from step 1
    output:
      - "heatmap.geojson — spatial grid cells with aggregated metrics"
      - "path.geojson — time-ordered path for playback slider"
    file_to_create: track_processor.py

    processing_steps:
      1: "filter to GPS-locked frames only"
      2: "detect link loss events (rc_snr==0 or bitrate==0/signal==0)"
      3: "calculate bearing per point from GPS deltas, smooth 5-point rolling avg, freeze below 3km/h"
      4: "detect laps via lap gate crossing (LineString provided by user at upload)"
      5: "for multi-lap: average all laps per spatial cell"
      6: "spatial downsampling — bin points into grid_size_m cells (0.5 or 1.0)"
      7: "per cell: compute avg/min/max for all metrics, flag link_loss boolean"
      8: "output heatmap.geojson and path.geojson"

    heatmap_geojson_structure:
      type: FeatureCollection
      metadata_fields: [test_id, grid_size_m, metric_ranges, laps, total_cells]
      feature_properties:
        - avg_rc_snr
        - min_rc_snr
        - avg_bitrate
        - min_bitrate
        - avg_video_signal
        - min_video_signal
        - avg_altitude
        - avg_speed
        - cell_samples
        - link_loss          # boolean
        - link_loss_type     # "rc" | "video" | "both" | null

    path_geojson_structure:
      type: FeatureCollection
      geometry: Point per sample (not downsampled — full time resolution)
      feature_properties:
        - timestamp_ms
        - bearing_deg
        - rc_snr_db
        - bitrate_mbps
        - video_signal_level
        - altitude_m
        - speed_ms
        - lap_number

    lap_detection:
      method: >
        User draws a lap gate (LineString, 2 points) on the map during upload.
        Processor detects each time the drone path crosses that line.
        First crossing = lap 1 start. Each subsequent crossing = new lap.
      edge_cases:
        - ignore crossings in first 5 seconds (takeoff noise)
        - minimum lap duration: 10 seconds
      output: lap_number field on each path point, plus test_laps summary rows

    link_loss_rules:
      rc_loss: "rc_snr_db == 0"
      video_loss: "bitrate_mbps == 0 OR video_signal_level == 0"
      combined: "both simultaneously = type 'both'"
      duration: "consecutive loss frames × frame interval = duration_ms"


# ══════════════════════════════════════════════════════════════════════════════
# DATABASE SCHEMA (Cloudflare D1 / SQLite)
# ══════════════════════════════════════════════════════════════════════════════
database:
  status: COMPLETE
  migration_file: db/migrations/0001_initial.sql

  tables:
    users:
      pk: id (TEXT, Supabase UUID)
      columns: [email, display_name, role, created_at]
      roles: ["pilot", "admin"]

    drone_profiles:
      pk: id (TEXT, random hex)
      fk: user_id → users.id
      columns: [name, frame, motors, fc, vtx, props, weight_g, notes, created_at, updated_at]

    tracks:
      pk: id (TEXT)
      columns: [name, slug, type, status, location_name, center_lat, center_lon,
                boundary_geojson, lap_gate_geojson, length_m, description,
                test_count, promoted_at, created_by, created_at]
      seeded: "enduro-01 (Enduro Racetrack, geometry TBD)"

    tests:
      pk: id (TEXT)
      fks: [user_id, track_id, drone_profile_id]
      columns:
        naming: [auto_name, custom_name]
        classification: [category, system_under_test]
        pilot: [pilot_lat, pilot_lon, pilot_bearing_deg]
        processing: [grid_size_m, lap_count]
        weather: [wind_speed, wind_direction, weather_notes]
        r2_keys: [heatmap_key, path_key]
        stats: [stats_json, duration_s, total_distance_m, link_loss_count]
        meta: [notes, status, created_at, published_at]
      status_values: ["draft", "published"]

    test_laps:
      pk: id
      fk: test_id → tests.id (CASCADE DELETE)
      columns: [lap_number, duration_s, distance_m, stats_json]
      unique: (test_id, lap_number)

    link_loss_events:
      pk: id
      fk: test_id → tests.id (CASCADE DELETE)
      columns: [lat, lon, timestamp_ms, type, duration_ms]
      type_values: ["rc", "video", "both"]

  views:
    v_tracks_with_stats: "tracks + published test count"


# ══════════════════════════════════════════════════════════════════════════════
# CLOUDFLARE WORKER API
# ══════════════════════════════════════════════════════════════════════════════
worker_api:
  status: SKELETON STARTED (index.ts + utils.ts created, route handlers not implemented)
  framework: itty-router
  entry: workers/src/index.ts
  wrangler_config: workers/wrangler.toml

  placeholders_to_fill:
    - REPLACE_WITH_YOUR_D1_DATABASE_ID  (in wrangler.toml)
    - REPLACE_WITH_YOUR_SUPABASE_URL    (in wrangler.toml)
    - REPLACE_WITH_YOUR_DOMAIN          (in wrangler.toml)
    - SUPABASE_JWT_SECRET               (set via: wrangler secret put SUPABASE_JWT_SECRET)

  routes:
    public:
      - "GET  /api/health"
      - "POST /api/auth/sync          — sync Supabase user to D1 on first login"
      - "GET  /api/tracks             — list all tracks"
      - "GET  /api/tracks/:slug       — single track detail"
      - "GET  /api/tests              — list published tests (filter: track_id, category, user_id)"
      - "GET  /api/tests/:id          — single test detail"
      - "GET  /api/tests/:id/geojson/heatmap  — proxy heatmap GeoJSON from R2"
      - "GET  /api/tests/:id/geojson/path     — proxy path GeoJSON from R2"

    authenticated:
      - "GET  /api/me                 — current user"
      - "PUT  /api/me                 — update display name"
      - "GET  /api/me/profiles        — list drone profiles"
      - "POST /api/me/profiles        — create profile"
      - "PUT  /api/me/profiles/:id    — update profile"
      - "DEL  /api/me/profiles/:id    — delete profile"
      - "GET  /api/me/tests           — list own tests (drafts + published)"
      - "POST /api/tests              — create draft test"
      - "PUT  /api/tests/:id          — update draft metadata"
      - "POST /api/tests/:id/publish  — publish draft"
      - "DEL  /api/tests/:id         — delete own test"
      - "POST /api/upload/heatmap     — upload heatmap.geojson to R2"
      - "POST /api/upload/path        — upload path.geojson to R2"

    admin:
      - "POST /api/tracks             — create track"
      - "PUT  /api/tracks/:slug       — update track geometry/metadata"
      - "POST /api/tracks/:slug/promote — promote non-standard to standard"

  r2_key_pattern: "tests/{test_id}/heatmap.geojson  and  tests/{test_id}/path.geojson"

  files_needed:
    - workers/src/routes/auth.ts
    - workers/src/routes/profiles.ts
    - workers/src/routes/tracks.ts
    - workers/src/routes/tests.ts
    - workers/src/routes/upload.ts
    - workers/src/lib/utils.ts    # COMPLETE


# ══════════════════════════════════════════════════════════════════════════════
# FRONTEND
# ══════════════════════════════════════════════════════════════════════════════
frontend:
  status: NOT STARTED
  framework: "vanilla HTML/CSS/JS preferred for simplicity — no build step needed for Cloudflare Pages"
  map_library: Leaflet.js
  heatmap_plugin: leaflet.heat
  hosting: Cloudflare Pages (deploy from git or direct upload)

  pages:
    index:
      route: /
      description: viewer — public, no login required
      features:
        - test browser panel (filter by track, category, system, pilot, date)
        - heatmap rendered from heatmap.geojson
        - metric picker: [rc_snr_db, video_signal_level, bitrate_mbps, altitude_m, distance_m]
        - pilot position marker + bearing cone/arrow
        - GPS path overlay (dashed line)
        - link loss red dot markers
        - compare mode: two tests on same track, layered heatmaps
        - test info panel: gear, weather, lap stats
        - playback slider: animates drone position + bearing arrow along path.geojson

    upload:
      route: /upload
      auth_required: true
      description: multi-step upload wizard
      steps:
        1_file:
          - drag-drop or pick CSV (output of walksnail_osd_parser.py)
          - parse and validate client-side
          - show basic stats (frame count, duration, GPS lock %)
        2_map_setup:
          - show GPS path on map
          - trim handles: drag start and end point on path timeline
          - mark pilot position: click map to place marker, then set bearing (compass input or drag arrow)
          - draw lap gate: click two points on map to define crossing line (circuit mode)
          - OR confirm start/end endpoints (range mode)
          - choose grid size: 0.5m or 1.0m radio buttons
          - lap count detected automatically, shown for confirmation
        3_metadata:
          - category selector (link selected by default in V1)
          - system under test (free text, e.g. "WalkSnail Avatar Pro 1W")
          - track picker: dropdown of tracks + proximity-matched suggestions
          - drone profile: pick saved profile OR enter new (with offer to save)
          - test name: auto-generated shown, editable
          - weather: optional fields (wind speed, direction, notes)
          - notes: free text
        4_preview:
          - preview heatmap rendered from processed data
          - per-lap summary table (if multi-lap)
          - link loss count and locations shown
          - submit as draft OR publish immediately
      processing:
        where: client-side JavaScript (track_processor logic ported to JS)
        output: heatmap.geojson + path.geojson generated in browser
        upload: POST to /api/upload/heatmap and /api/upload/path, then POST /api/tests

    profile:
      route: /profile
      auth_required: true
      features:
        - view/edit display name
        - manage drone profiles (CRUD)
        - list own tests with status (draft/published), edit or delete drafts

  design_notes: >
    Dark theme. Monospace font for telemetry data. Map takes primary space.
    Controls and panels in sidebar or overlay. See heatmap_viewer.html already
    delivered as design reference for the viewer aesthetic (dark, CartoDB tiles,
    cyan accent color).


# ══════════════════════════════════════════════════════════════════════════════
# BUILD ORDER
# ══════════════════════════════════════════════════════════════════════════════
build_order:
  completed:
    - "[1a] WalkSnail OSD parser (walksnail_osd_parser.py)"
    - "[1b] D1 database schema (0001_initial.sql)"
    - "[1c] Worker skeleton (index.ts, utils.ts, wrangler.toml)"
    - "[1d] Local heatmap viewer proof-of-concept (heatmap_viewer.html)"

  next_immediate:
    - "[2]  Track processor (track_processor.py) — spatial downsampling, lap detection, GeoJSON output"
    - "[3]  Worker route handlers — auth, profiles, tracks, tests, upload"
    - "[4]  Frontend upload wizard"
    - "[5]  Frontend public viewer"

  setup_steps_for_human:
    cloudflare:
      - "Create D1 database: wrangler d1 create fpv-heatmap-db"
      - "Note the database_id and paste into workers/wrangler.toml"
      - "Create R2 bucket: wrangler r2 bucket create fpv-heatmap-storage"
      - "Run migration: wrangler d1 migrations apply fpv-heatmap-db --remote"
      - "Set JWT secret: wrangler secret put SUPABASE_JWT_SECRET"
      - "Deploy worker: cd workers && wrangler deploy"
      - "Connect Pages: wrangler pages project create fpv-heatmap"
      - "Add custom domain in Cloudflare Pages dashboard"
    supabase:
      - "Create project at supabase.com"
      - "Enable Google OAuth provider in Auth settings"
      - "Copy project URL and JWT secret into wrangler.toml / secret"
      - "Set redirect URL to your domain"


